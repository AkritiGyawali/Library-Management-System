<!-- templates/signin.html -->
<!DOCTYPE html>
<html>
<head>
     <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f8f9fa;
        }

        .container {
            max-width: 700px;
            margin: 50px auto;
            background: #fff;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 12px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px;
            border: 1px solid #ddd;
            text-align: left;
        }

        th {
            background-color: rgba(255, 0, 0, 0.495);
            color: white;
        }

        tr:nth-child(even) {
            background-color: #f2f2f2;
        }

        a {
            text-align: center;
            display: block;
            margin-top: 20px;
            text-decoration: none;
            color: red;
        }
    </style>
    <title>Sign In</title>
</head>
<body>
    <h2 style="color: #4CAF50;" >Sign In to visit library</h2>
    <form method="POST" action="/signin">
        <label>Username:</label>
        <input type="text" name="username" required><br><br>

        <label>Password:</label>
        <input type="password" name="password" required><br><br>

        <input type="submit" value="Login">
    </form>
    <div>
        <p style="color:brown"> {{error}}</p>
    </div>
    <p style="color:crimson">Don't have an account? <a href="/signup">Sign up here</a></p>
</body>
</html>
