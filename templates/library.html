<!DOCTYPE html>
<html>
<head>
    <title>Library Management System</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f7f9fc;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 700px;
            margin: 80px auto;
            padding: 30px;
            background-color: white;
            border-radius: 12px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
            text-align: center;
        }

        h1 {
            margin-bottom: 30px;
            color: #333;
        }

        a.button {
            display: inline-block;
            padding: 12px 24px;
            margin: 10px;
            font-size: 16px;
            background-color: #4CAF50;
            color: white;
            border-radius: 6px;
            text-decoration: none;
            transition: background-color 0.3s ease;
        }

        a.button:hover {
            background-color:#3f51b5;
        }
    </style>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>
<body>

<div class="container">
    <h1>📚 Library Management System</h1>
    <a href="/add_book" class="button"><i class="bi bi-book"></i> Add Book</a>
    <a href="/add_student" class="button"><i class="fas fa-user-plus"></i> Add Student</a>
    <a href="/issue_book" class="button"><i class="	fas fa-book-reader"></i> Issue Book</a>
    <a href="/return_book" class="button"><i class="fas fa-undo-alt"></i> Return Book</a>
    <a href="/report" class="button"><i class="fas fa-chart-bar"></i> View Reports</a>
    <a href="/overdue" class="button"><i class="fas fa-exclamation-circle"></i> View Overdue Books</a>
    <a href="/report_issued_book" class="button"><i class="fas fa-eye	"></i> View Issued Books</a>
    <a href="/student_input" class="button"><i class="fas fa-search"></i> Search Student ID</a>
    
    <a href="/student_input" class="button"><i class="	fas fa-history"></i> Student History</a>
    <a href="/book_detail" class="button"><i class="fas fa-book"></i> Book Details</a>
    <a href="/student_detail" class="button"><i class="fas fa-id-card"></i> Student Details</a>
    <a href="/logout" class="button"><i class="fas fa-sign-out-alt"></i> Logout</a>
</div>
"GET
</body>
</html>
