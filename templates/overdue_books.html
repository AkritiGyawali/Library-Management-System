<!DOCTYPE html>
<html>
<head>
    <title>Overdue Books</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f8fa;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 800px;
            margin: 50px auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 12px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            color: #333;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 25px;
        }

        th, td {
            border: 1px solid #ccc;
            padding: 12px;
            text-align: left;
        }

        th {
            background-color: #4CAF50;
            color: white;
        }

        tr:nth-child(even) {
            background-color: #f2f2f2;
        }

        a {
            display: block;
            margin-top: 20px;
            text-align: center;
            text-decoration: none;
            color: #4CAF50;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Overdue Books</h2>

    {% if records %}
    <table>
        <thead>
            <tr>
                <th>Student Name</th>
                <th>Book Name</th>
                <th>Due Date</th>
            </tr>
        </thead>
        <tbody>
            {% for row in records %}
            <tr>
                <td>{{ row[0] }}</td>  <!-- student_name -->
                <td>{{ row[1] }}</td>  <!-- book_name -->
                <td>{{ row[2] }}</td>  <!-- due_date -->
            </tr>
            {% endfor %}
        </tbody>
    </table>
    {% else %}
        <p style="text-align:center;">No overdue books found.</p>
    {% endif %}

    <a href="/">← Back to Home</a>
</div>

</body>
</html>
